name: Release to npm

# Triggered by pushing a version tag (e.g. `v0.4.3`). Tag the release
# locally, push it, and the rest happens here:
#
#   npm version patch    # bumps package.json + commits + tags
#   git push --follow-tags
#
# npm's trusted-publisher mechanism (configured at
# https://www.npmjs.com/package/spandrel/access) exchanges the
# workflow's OIDC token for a short-lived publish credential, so no
# NPM_TOKEN secret is stored anywhere. The `--provenance` flag attaches
# a signed attestation to the published tarball that ties it back to
# this exact workflow run.

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22 ships with npm 11.x, which has built-in OIDC
          # trusted-publisher support for `npm publish --provenance`.
          # Node 20's bundled npm (10.x) does not, and silently falls
          # through to the empty _authToken that setup-node writes when
          # NODE_AUTH_TOKEN is unset — surfacing as a generic 404.
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm test
      # `actions/setup-node` writes `_authToken=${NODE_AUTH_TOKEN}` to
      # ~/.npmrc; with no NODE_AUTH_TOKEN that becomes an empty token,
      # which npm uses verbatim and gets a 404 instead of falling
      # through to the OIDC trusted-publisher exchange. Stripping the
      # token line lets the OIDC path engage.
      - run: rm -f ~/.npmrc
      - run: npm publish --provenance --access public
