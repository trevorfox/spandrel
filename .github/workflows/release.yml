name: Release to npm

# Triggered by pushing a version tag (e.g. `v0.4.3`). Tag the release
# locally, push it, and the rest happens here:
#
#   npm version patch    # bumps package.json + commits + tags
#   git push --follow-tags
#
# npm's trusted-publisher mechanism (configured at
# https://www.npmjs.com/package/spandrel/access) exchanges the
# workflow's OIDC token for a short-lived publish credential, so no
# NPM_TOKEN secret is stored anywhere. The `--provenance` flag attaches
# a signed attestation to the published tarball that ties it back to
# this exact workflow run.

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      # OIDC trusted-publisher publish landed in npm 11.5.1; Node 22
      # still ships with npm 10.9. Explicitly upgrade so the publish
      # step can do the OIDC exchange against the registry.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm test
      # `actions/setup-node` writes `_authToken=${NODE_AUTH_TOKEN}` to
      # the userconfig at $NPM_CONFIG_USERCONFIG (a temp file, NOT
      # ~/.npmrc); with no NODE_AUTH_TOKEN that becomes an empty
      # token, which npm uses verbatim and gets a 404 instead of
      # falling through to the OIDC trusted-publisher exchange.
      # Removing the file lets the OIDC path engage.
      - run: rm -f "$NPM_CONFIG_USERCONFIG"
      - run: npm publish --provenance --access public
